services:
  - type: web
    name: trading-autopilot
    runtime: docker
    plan: free
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: KITE_API_KEY
        sync: false
      - key: KITE_API_SECRET
        sync: false
      - key: APP_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://ultra-trade-9d8r.onrender.com
      - key: TRADING_MODE
        value: paper
      - key: APP_SECRET_KEY
        generateValue: true
